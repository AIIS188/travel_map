name: travel_map
description: 大理洱海旅游地图 - Flutter App（amap_map 最新版）
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── 高德地图（kuloud 维护，最新版）────────────────────────
  amap_map: ^1.0.15
  x_amap_base: ^1.0.3

  # ── 持久化 ───────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # ── 图片选择 ─────────────────────────────────────────────
  image_picker: ^1.0.7

  # ── 文件导入导出 ──────────────────────────────────────────
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # ── 状态管理 ──────────────────────────────────────────────
  provider: ^6.1.2

  # ── 工具 ──────────────────────────────────────────────────
  uuid: ^4.3.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
